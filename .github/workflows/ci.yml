name: ABR Protocol CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, 3.10, 3.11]

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
        pip install -e .
    
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --statistics
    
    - name: Type check with mypy
      run: |
        mypy abrchain --ignore-missing-imports
    
    - name: Test with pytest
      run: |
        pytest test/unit/ --cov=abrchain --cov-report=xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  verify-genesis:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Verify genesis block
      run: |
        python verify_genesis.py
        python -c "from abrchain.core.genesis import GENESIS_HASH; assert GENESIS_HASH == '3da515799179d2f8bf0fbb86167bef332ea2bbb972631922b6ca98ce64aff3a7'"

  build:
    runs-on: ubuntu-latest
    needs: [test, verify-genesis]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./docker/compose/Dockerfile.core
        push: false
        tags: abrchain/core:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
