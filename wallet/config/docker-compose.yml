version: '3.8'

services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: abr_wallet
      POSTGRES_USER: wallet_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - wallet-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - wallet-network
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: abr_wallet
      DB_USER: wallet_user
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      CARD_SERVICE_URL: http://card-service:3008
      NODE_ENV: production
    ports:
      - "3009:3009"
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    networks:
      - wallet-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:3009
      REACT_APP_WS_URL: ws://localhost:8080
    depends_on:
      - backend
    networks:
      - wallet-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  wallet-network:
    driver: bridge
